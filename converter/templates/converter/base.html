<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>PageCapture — URL to PDF</title>
  <meta name="description" content="Convert entire websites to PDF in minutes.">
  <meta name="theme-color" content="#0a0a0f">
  {% load static %}
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{% static 'converter/css/app.css' %}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
{% csrf_token %}

<nav class="navbar navbar-expand-lg border-bottom sticky-top pc-nav">
  <div class="container-fluid px-4">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      <div class="pc-brand-icon">
        <i class="bi bi-layers-fill"></i>
      </div>
      <span class="fw-bold fs-5">PageCapture</span>
    </a>
  </div>
</nav>

<main class="flex-grow-1 d-flex flex-column">
  {% block content %}{% endblock %}
</main>

<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
